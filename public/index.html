<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOXL HUNTER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080a;--card:#111118;--card2:#1a1a1f;--border:#222233;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--text:#f0f0f0;--dim:#666;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:12px;max-width:500px;margin:0 auto}
.hdr{text-align:center;padding:20px 0 14px}
.hdr h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:#fff}
.hdr h1 span{color:var(--accent)}
.hdr .mode{font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:6px;font-weight:700;letter-spacing:2px}
.mode-atk{color:#f97316}
.mode-safe{color:#22c55e}
.mode-bal{color:#a78bfa}

.strat-bar{display:flex;gap:6px;margin-bottom:14px}
.strat-btn{flex:1;padding:14px 10px;border-radius:14px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;text-align:center;line-height:1.6;border:2px solid var(--border);background:var(--card);color:var(--dim)}
.strat-btn.on-atk{border-color:#f97316;background:linear-gradient(135deg,#1a0f00,#111118);color:#f97316}
.strat-btn.on-safe{border-color:#22c55e;background:linear-gradient(135deg,#001a0f,#111118);color:#22c55e}
.strat-btn.on-bal{border-color:#a78bfa;background:linear-gradient(135deg,#0f001a,#111118);color:#a78bfa}

.tabs{display:flex;gap:3px;margin-bottom:14px;background:var(--card);border-radius:12px;padding:3px;border:1px solid var(--border)}
.tab{flex:1;padding:9px;border:none;border-radius:10px;background:none;color:var(--dim);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.tab.on{background:var(--accent);color:#fff}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.ct{font-family:'JetBrains Mono',monospace;font-size:10px;color:#444;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;font-weight:700}
.ir{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ir label{font-size:13px;color:var(--dim);width:75px;font-weight:600}
.ir input{flex:1;background:#0a0a0f;border:2px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;text-align:right;outline:none;-webkit-appearance:none}
.ir input:focus{border-color:var(--accent)}
.ir .u{font-size:13px;color:var(--dim);width:16px;font-weight:700}

.tier-box{text-align:center;padding:18px;margin-bottom:12px;border-radius:var(--radius);border:1px solid var(--border)}
.tier-atk{background:linear-gradient(135deg,#1a0f00,#111118);border-color:#f9731633}
.tier-safe{background:linear-gradient(135deg,#001a0f,#111118);border-color:#22c55e33}
.tier-box .n{font-family:'JetBrains Mono',monospace;font-size:44px;font-weight:800}
.tier-box .s{font-size:12px;color:var(--dim);margin-top:4px;font-weight:600}

.loc-box{background:var(--card2);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.loc-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:12px}
.order{border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border)}
.order.buy-atk{background:#1a0f0011;border-color:#f9731633}
.order.buy-safe{background:#001a0f11;border-color:#22c55e33}
.order .lbl{font-size:10px;color:var(--dim);font-weight:700;letter-spacing:1px}
.order .val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;color:var(--text);margin-top:3px}
.order .desc{font-size:11px;color:var(--dim);margin-top:3px;font-weight:500}

.btn{width:100%;padding:13px;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.btn:active{transform:scale(0.97)}
.btn-b{background:var(--accent);color:#fff}
.btn-g{background:var(--green);color:#fff}
.btn-r{background:var(--red);color:#fff}
.btn-x{background:none;border:1px solid #333;color:#555;font-size:11px;padding:9px;margin-top:12px}

.pi{background:var(--card2);border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid var(--border)}
.pp{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:12px 0}
.sb{background:var(--card);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--border)}
.sb .v{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:800}
.sb .l{font-size:9px;color:var(--dim);margin-top:3px;font-weight:700;letter-spacing:1px}
.ti{font-size:11px;padding:5px 0;border-bottom:1px solid var(--border);font-weight:600;font-family:'JetBrains Mono',monospace}

.hidden{display:none}
.info{font-size:13px;color:var(--dim);text-align:center;font-weight:500;padding:16px 0}
.warn{background:#1a1a00;border:1px solid #4a4a00;border-radius:10px;padding:12px;text-align:center;color:#fbbf24;font-size:13px;font-weight:600;margin-bottom:12px}
.footer{text-align:center;font-size:9px;color:#333;padding:16px 0;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<div class="hdr">
  <h1>SOXL <span>HUNTER</span></h1>
  <div class="mode" id="mode-label"></div>
</div>

<div class="strat-bar">
  <div class="strat-btn" id="sb-1" onclick="switchStrat(1)">🔥 공격<br>상2/하5 · 3% · 7일<br>111배 MDD-54%</div>
  <div class="strat-btn" id="sb-3" onclick="switchStrat(3)">⚡ 밸런스<br>상1/하6 · 2% · 10일<br>95배 2022+5%!</div>
  <div class="strat-btn" id="sb-2" onclick="switchStrat(2)">🛡️ 안전<br>상2/하4 · 2% · 10일<br>83배 손실0년!</div>
</div>

<div class="tabs">
  <button class="tab on" onclick="sTab('main',this)">매매</button>
  <button class="tab" onclick="sTab('pos',this)">티어</button>
  <button class="tab" onclick="sTab('hist',this)">기록</button>
  <button class="tab" onclick="sTab('guide',this)">가이드</button>
</div>

<div id="tab-main">
  <div class="card">
    <div class="ct">설정</div>
    <div class="ir"><label>시드</label><input type="number" id="seed" value="20000" oninput="sv();go()"><span class="u">$</span></div>
    <div class="ir"><label>전날종가</label><input type="number" step="0.01" id="prev" placeholder="90.00" oninput="go()"><span class="u">$</span><button onclick="fetchPrice()" style="padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;cursor:pointer;margin-left:4px;white-space:nowrap">자동</button></div>
    <div id="unit-info" style="font-size:11px;color:var(--dim);text-align:right;font-weight:600;font-family:'JetBrains Mono',monospace"></div>
  </div>
  <div id="out"></div>
  <button class="btn btn-x" onclick="resetCur()">이 전략 초기화</button>
</div>

<div id="tab-pos" class="hidden"><div id="pos-out"></div></div>
<div id="tab-hist" class="hidden"><div id="hist-out"></div></div>
<div id="tab-guide" class="hidden">
  <div class="card" style="font-size:12px;line-height:2;color:var(--dim)">
    <div id="guide-content"></div>
  </div>
</div>

<div class="footer">SOXL HUNTER v7.1 · 3전략</div>

<script>
const S={
  1:{name:'공격',icon:'🔥',up:2,dn:5,tu:20,tp:0.03,fd:7,key:'h7a',
     cls:'atk',color:'#f97316',
     desc:'CAGR +96% · MDD -54% · 111배 · 승률76%',
     rets:[161,143,-16,111,151,101,55],mdds:[-54,-20,-52,-33,-30,-51,-21]},
  3:{name:'밸런스',icon:'⚡',up:1,dn:6,tu:20,tp:0.02,fd:10,key:'h7b',
     cls:'bal',color:'#a78bfa',
     desc:'CAGR +92% · MDD -63% · 95배 · 2022+5%!',
     rets:[96,150,5,112,200,97,48],mdds:[-49,-19,-54,-33,-29,-51,-19]},
  2:{name:'안전',icon:'🛡️',up:2,dn:4,tu:20,tp:0.02,fd:10,key:'h7s',
     cls:'safe',color:'#22c55e',
     desc:'CAGR +88% · MDD -52% · 83배 · 손실0년!',
     rets:[135,125,10,101,147,88,52],mdds:[-52,-20,-40,-28,-30,-48,-18]},
};

let cs=1; // current strategy
let UP,DN,TU,TP,FD;
let pos=[],hist=[],seed=20000;

function gv(id){return parseFloat(document.getElementById(id).value)||0}
function td(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function db(a,b){return Math.floor((new Date(b)-new Date(a))/864e5)}

async function fetchPrice(){
  const btn=event.target;btn.textContent='...';btn.disabled=true;
  try{
    const r=await fetch('https://query1.finance.yahoo.com/v8/finance/chart/SOXL?range=2d&interval=1d');
    const d=await r.json();
    const meta=d.chart.result[0].meta;
    const pc=meta.chartPreviousClose||meta.regularMarketPrice;
    if(pc){
      document.getElementById('prev').value=pc;
      go();
      btn.textContent='✓';btn.style.background='var(--green)';
    }else{
      btn.textContent='✗';btn.style.background='var(--red)';
    }
  }catch(e){btn.textContent='✗';btn.style.background='var(--red)';}
  setTimeout(()=>{btn.textContent='자동';btn.style.background='var(--accent)';btn.disabled=false;},2000);
}

function sv(){
  seed=gv('seed')||20000;
  localStorage.setItem(S[cs].key,JSON.stringify({pos,hist,seed}));
}
function ld(){
  try{
    const d=JSON.parse(localStorage.getItem(S[cs].key));
    if(d){pos=d.pos||[];hist=d.hist||[];seed=d.seed||20000;}
    else{pos=[];hist=[];seed=20000;}
    document.getElementById('seed').value=seed;
  }catch(e){pos=[];hist=[];}
}

function switchStrat(n){
  // 현재 저장
  sv();
  // 전환
  cs=n;
  const s=S[cs];
  UP=s.up;DN=s.dn;TU=s.tu;TP=s.tp;FD=s.fd;
  // 로드
  ld();
  // UI
  document.getElementById('sb-1').className='strat-btn'+(cs===1?' on-atk':'');
  document.getElementById('sb-3').className='strat-btn'+(cs===3?' on-bal':'');
  document.getElementById('sb-2').className='strat-btn'+(cs===2?' on-safe':'');
  document.getElementById('mode-label').textContent=`${s.icon} ${s.name} · ${s.desc}`;
  document.getElementById('mode-label').className='mode mode-'+s.cls;
  localStorage.setItem('h7-last',cs);
  go();
}

function go(){
  const pv=gv('prev');
  seed=gv('seed')||20000;
  const uw=seed/TU;
  const s=S[cs];
  const el=document.getElementById('out');
  
  const sUp=pv>0?Math.floor(uw*UP/pv):0;
  const sDn=pv>0?Math.floor(uw*DN/pv):0;
  const sDnX=pv>0?Math.floor(uw*(DN-UP)/pv):0;
  
  document.getElementById('unit-info').innerHTML=
    `1u=$${uw.toFixed(0)} · ${UP}u=${sUp}주 · ${DN}u=${sDn}주 · 익절${TP*100}% · 강제${FD}일`;
  
  if(!pv){el.innerHTML='';return}
  
  const loc1=+(pv*1.15).toFixed(2);
  const loc2=+(pv-0.01).toFixed(2);
  const curPrice=pv;
  const ti=pos.reduce((a,p)=>a+p.u,0);
  const rem=TU-ti;
  
  let h='';
  
  // 티어 표시
  h+=`<div class="tier-box tier-${s.cls}">
    <div style="font-size:10px;color:var(--dim);font-weight:700;letter-spacing:2px">${s.icon} ${s.name} 투입</div>
    <div class="n" style="color:${s.color}">${ti}/${TU}</div>
    <div class="s">${ti===0?'대기 중':ti>=TU?'풀 투입':'매수 진행 중'} · 잔여${rem}u · ${pos.length}건</div>
  </div>`;
  
  // 보유 티어
  if(pos.length>0){
    h+=`<div class="card"><div class="ct">${s.icon} 보유 티어</div>`;
    pos.forEach((p,idx)=>{
      const pnl=curPrice>0?((curPrice-p.e)/p.e*100):0;
      const days=db(p.d,td());
      const rm=FD-days;
      const isForce=days>=FD;
      const isTP=curPrice>=p.e*(1+TP);
      let sellInfo='',sellColor='var(--accent)',sellBtn='';
      if(isTP){
        sellInfo=`LOC $${p.tp} 체결! +${pnl.toFixed(1)}%`;
        sellColor='var(--green)';
        sellBtn=`<button class="btn btn-g" onclick="doSell(${p.id},'LOC${TP*100}%',${curPrice})" style="padding:9px;font-size:12px;margin-top:6px">T${idx+1} 익절</button>`;
      }else if(isForce){
        sellInfo=`${FD}일! LOC취소→MOC ${p.sh||'?'}주`;
        sellColor='var(--red)';
        sellBtn=`<button class="btn btn-r" onclick="doSell(${p.id},'MOC${FD}일',${curPrice})" style="padding:9px;font-size:12px;margin-top:6px">T${idx+1} 강제</button>`;
      }else{
        sellInfo=`LOC ${p.sh||'?'}주 @ $${p.tp} (D+${days} 잔여${rm}일)`;
      }
      h+=`<div class="pi">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <span style="color:${s.color};font-weight:800;font-size:13px">T${idx+1}</span>
            <span style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;margin-left:6px">${p.sh||'?'}주@$${p.e}</span>
            <span style="color:var(--dim);font-size:11px;margin-left:3px">${p.u}u</span>
          </div>
          <div class="pp" style="color:${pnl>=0?'var(--green)':'var(--red)'};font-size:15px">${pnl>=0?'+':''}${pnl.toFixed(1)}%</div>
        </div>
        <div style="margin-top:6px;font-size:12px;font-weight:600;color:${sellColor}">${sellInfo}</div>
        ${sellBtn}
      </div>`;
    });
    h+=`</div>`;
  }
  
  // LOC 주문
  if(rem>0){
    h+=`<div class="loc-box">
      <div class="loc-title">📋 오늘 밤 LOC 주문 (${s.name})</div>
      <div class="order buy-${s.cls}">
        <div class="lbl">① 기본 (무조건)</div>
        <div class="val">LOC 매수 ${sUp}주 @ $${loc1}</div>
        <div class="desc">${UP}유닛 · 전날×1.15</div>
      </div>
      <div class="order buy-${s.cls}">
        <div class="lbl">② 하락 추가</div>
        <div class="val">LOC 매수 ${sDnX}주 @ $${loc2}</div>
        <div class="desc">${DN-UP}유닛 · 전날-$0.01 · 하락만</div>
      </div>
      <div style="font-size:11px;color:var(--dim);margin-top:10px;padding-top:8px;border-top:1px solid var(--border);font-weight:600">
        상승=${sUp}주(${UP}u) · 하락=${sDn}주(${DN}u) · 익절${TP*100}% · 강제${FD}일
      </div>
    </div>`;
    
    // 체결 기록
    h+=`<div class="card">
      <div class="ct">체결 기록</div>
      <div class="ir"><label>체결가</label><input type="number" step="0.01" id="fill-price" placeholder="종가" oninput="updateFill()"><span class="u">$</span></div>
      <div class="ir"><label>유닛</label><input type="number" id="fill-units" value="${UP}" oninput="updateFill()"><span class="u">u</span></div>
      <div class="ir"><label>주수</label><input type="number" id="fill-shares" value="${sUp}"><span class="u">주</span></div>
      <div id="fill-info" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim);margin:8px 0;padding:10px;background:#0a0a0f;border-radius:8px"></div>
      <button class="btn btn-b" onclick="doBuy()">T${pos.length+1} 기록</button>
    </div>`;
  }else{
    h+=`<div class="warn">${TU}u MAX — 매수 불가</div>`;
  }
  
  // 통계
  const tpnl=pos.reduce((a,p)=>a+((curPrice-p.e)/p.e*p.u/TU*100),0);
  const ts=hist.filter(x=>x.a==='S');
  const tw=ts.filter(x=>x.pnl>=0).length;
  h+=`<div class="sg">
    <div class="sb"><div class="v">${ti}/${TU}</div><div class="l">투입</div></div>
    <div class="sb"><div class="v" style="color:${tpnl>=0?'var(--green)':'var(--red)'}">${tpnl>=0?'+':''}${tpnl.toFixed(1)}%</div><div class="l">미실현</div></div>
    <div class="sb"><div class="v">${pos.length}</div><div class="l">보유</div></div>
    <div class="sb"><div class="v">${tw}/${ts.length}</div><div class="l">승/매도</div></div>
  </div>`;
  
  el.innerHTML=h;
}

function updateFill(){
  const fp=gv('fill-price'),pv=gv('prev');
  if(!fp)return;
  const uw=seed/TU;
  const isdn=pv>0&&fp<pv;
  const units=isdn?DN:UP;
  const ti=pos.reduce((a,p)=>a+p.u,0);
  const au=Math.min(units,TU-ti);
  const ss=pv>0?Math.floor(au*uw/pv):0;
  const tp=(fp*(1+TP)).toFixed(2);
  document.getElementById('fill-units').value=au;
  document.getElementById('fill-shares').value=ss;
  document.getElementById('fill-info').innerHTML=
    `T${pos.length+1} · ${isdn?'하락':'상승'} · ${ss}주@$${fp} (${au}u)<br>매도: LOC ${ss}주 @ $${tp}`;
}

function doBuy(){
  const fp=gv('fill-price'),fu=gv('fill-units')||UP,fsh=gv('fill-shares')||0;
  if(!fp){alert('체결가!');return}
  const ti=pos.reduce((a,p)=>a+p.u,0);
  if(ti+fu>TU){alert(`잔여 ${TU-ti}u!`);return}
  const tp=+(fp*(1+TP)).toFixed(2);
  pos.push({id:Date.now(),d:td(),e:fp,u:fu,tp:tp,sh:fsh});
  hist.push({id:Date.now(),d:td(),a:'B',pr:fp,u:fu,sh:fsh});
  sv();go();
}

function doSell(pid,reason,pr){
  const i=pos.findIndex(p=>p.id===pid);if(i===-1)return;
  const p=pos[i];
  const pnl=+((pr-p.e)/p.e*100).toFixed(2);
  const uw=seed/TU;
  const pw=+(pnl/100*p.u*uw).toFixed(0);
  hist.push({id:Date.now(),d:td(),a:'S',pr:pr,u:p.u,ep:p.e,pnl:pnl,pw:pw,r:reason,days:db(p.d,td()),sh:p.sh||0});
  pos.splice(i,1);sv();go();
}

function rPos(){
  const pv=gv('prev')||0,uw=seed/TU,s=S[cs];
  let h=`<div class="card"><div class="ct">${s.icon} ${s.name} 전체 티어</div>`;
  if(!pos.length)h+='<div class="info">보유 없음</div>';
  else{
    pos.forEach((p,idx)=>{
      const pnl=pv>0?((pv-p.e)/p.e*100):0;
      const days=db(p.d,td()),rm=FD-days;
      h+=`<div class="pi">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <span style="color:${s.color};font-weight:800">T${idx+1}</span>
            <span style="font-family:'JetBrains Mono',monospace;font-weight:700;margin-left:6px">${p.sh||'?'}주@$${p.e} (${p.u}u)</span><br>
            <span style="font-size:10px;color:var(--dim)">${p.d} · D+${days} ${rm>0?'잔여'+rm+'일':'⏰'} · 매도$${p.tp}</span>
          </div>
          <div class="pp" style="color:${pnl>=0?'var(--green)':'var(--red)'}">
            ${pnl>=0?'+':''}${pnl.toFixed(1)}%</div>
        </div>
      </div>`;
    });
    const tv=pos.reduce((a,p)=>a+p.u,0);
    const tsh=pos.reduce((a,p)=>a+(p.sh||0),0);
    h+=`<div style="padding-top:8px;border-top:1px solid var(--border);font-size:13px;font-weight:700;display:flex;justify-content:space-between;margin-top:8px;font-family:'JetBrains Mono',monospace">
      <span>${tv}/${TU}u</span><span>${tsh}주</span></div>`;
  }
  h+='</div>';
  document.getElementById('pos-out').innerHTML=h;
}

function rHist(){
  const s=S[cs];
  let h=`<div class="card"><div class="ct">${s.icon} ${s.name} 매매 기록</div>`;
  if(!hist.length)h+='<div class="info">기록 없음</div>';
  else{
    const sl=hist.filter(x=>x.a==='S'),wn=sl.filter(x=>x.pnl>=0),tp=sl.reduce((a,x)=>a+(x.pw||0),0);
    if(sl.length){
      h+=`<div class="sg" style="margin-top:0">
        <div class="sb"><div class="v" style="color:var(--green)">${wn.length}</div><div class="l">승</div></div>
        <div class="sb"><div class="v" style="color:var(--red)">${sl.length-wn.length}</div><div class="l">패</div></div>
        <div class="sb"><div class="v">${sl.length>0?(wn.length/sl.length*100).toFixed(0):0}%</div><div class="l">승률</div></div>
        <div class="sb"><div class="v" style="color:${tp>=0?'var(--green)':'var(--red)'}">$${tp}</div><div class="l">손익</div></div>
      </div>`;
    }
    [...hist].reverse().slice(0,30).forEach(x=>{
      if(x.a==='B')h+=`<div class="ti" style="color:var(--accent)">${x.d} 📥 ${x.u}u ${x.sh||'?'}주 @$${x.pr}</div>`;
      else{const c=x.pnl>=0?'var(--green)':'var(--red)';
        h+=`<div class="ti" style="color:${c}">${x.d} 📤 ${x.u}u $${x.ep}→$${x.pr} ${x.pnl>=0?'+':''}${x.pnl}% $${x.pw} [${x.r}]</div>`;}
    });
  }
  h+='</div>';
  document.getElementById('hist-out').innerHTML=h;
}

function updateGuide(){
  const s=S[cs];
  const yrs=['20','21','22','23','24','25','26'];
  let gc=`<div style="color:${s.color};font-size:15px;font-weight:700;margin-bottom:10px">${s.icon} ${s.name} 전략</div>
    <b style="color:var(--text)">매수:</b> LOC 2개<br>
    ① 전날×1.15 → ${s.up}유닛 (무조건)<br>
    ② 전날-$0.01 → ${s.dn-s.up}유닛 (하락만)<br>
    상승${s.up}u · 하락${s.dn}u · 익절${s.tp*100}% · 강제${s.fd}일<br><br>
    <b style="color:var(--text)">성과:</b> ${s.desc}<br><br>
    <b style="color:var(--text)">연도별:</b><br>`;
  
  let cum=20000;
  s.rets.forEach((r,i)=>{
    cum*=(1+r/100);
    const rc=r>=0?'var(--green)':'var(--red)';
    gc+=`<span style="color:${rc};font-family:'JetBrains Mono',monospace;font-weight:700">
      20${yrs[i]}: ${r>=0?'+':''}${r}% (MDD${s.mdds[i]}%)</span><br>`;
  });
  gc+=`<br><b style="color:var(--text)">$20K→$${(cum/1000).toFixed(0)}K (${(cum/20000).toFixed(0)}배)</b>`;
  
  document.getElementById('guide-content').innerHTML=gc;
}

function resetCur(){
  pos=[];hist=[];localStorage.removeItem(S[cs].key);go();rPos();rHist();
}

function sTab(n,btn){
  ['main','pos','hist','guide'].forEach(t=>document.getElementById('tab-'+t).classList.add('hidden'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+n).classList.remove('hidden');
  btn.classList.add('on');
  if(n==='pos')rPos();if(n==='hist')rHist();if(n==='guide')updateGuide();
}

// 초기화
const lastStrat=parseInt(localStorage.getItem('h7-last'))||1;
switchStrat(lastStrat);
// 자동 종가 로드
fetchPrice();
</script>
