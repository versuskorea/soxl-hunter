<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOXL HUNTER v8</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080a;--card:#111118;--card2:#1a1a1f;--border:#222233;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--text:#f0f0f0;--dim:#666;--radius:16px;
  --top:#a78bfa;--mid:#3b82f6;--bot:#22c55e}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:12px;max-width:500px;margin:0 auto}

.hdr{text-align:center;padding:20px 0 14px}
.hdr h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:#fff}
.hdr h1 span{color:var(--accent)}
.hdr .stats{font-family:'JetBrains Mono',monospace;font-size:10px;margin-top:6px;color:var(--green);letter-spacing:1px;font-weight:700}

.zone-bar{display:flex;gap:6px;margin-bottom:14px}
.zone-box{flex:1;padding:14px 8px;border-radius:12px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;text-align:center;border:2px solid var(--border);background:var(--card);color:var(--dim);letter-spacing:1px}
.zone-box.on{background:linear-gradient(135deg,#0a0a0f,var(--card));box-shadow:0 0 20px rgba(59,130,246,0.3)}
.zone-box.on-top{border-color:var(--top);color:var(--top)}
.zone-box.on-mid{border-color:var(--mid);color:var(--mid)}
.zone-box.on-bot{border-color:var(--bot);color:var(--bot)}
.zone-box .pct{font-size:16px;margin-top:4px;font-weight:800}
.zone-box .rule{font-size:9px;margin-top:4px;opacity:0.8}

.status-card{background:linear-gradient(135deg,#0a0a0f,var(--card));border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.status-card .title{font-size:11px;color:var(--dim);letter-spacing:2px;font-weight:700;margin-bottom:10px}
.status-row{display:flex;justify-content:space-between;align-items:center;margin:6px 0}
.status-row .k{font-size:12px;color:var(--dim)}
.status-row .v{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:800}
.zone-top{color:var(--top)}
.zone-mid{color:var(--mid)}
.zone-bot{color:var(--bot)}

.tabs{display:flex;gap:3px;margin-bottom:14px;background:var(--card);border-radius:12px;padding:3px;border:1px solid var(--border)}
.tab{flex:1;padding:9px;border:none;border-radius:10px;background:none;color:var(--dim);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.tab.on{background:var(--accent);color:#fff}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.ct{font-family:'JetBrains Mono',monospace;font-size:10px;color:#444;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;font-weight:700}
.ir{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ir label{font-size:13px;color:var(--dim);width:85px;font-weight:600}
.ir input{flex:1;background:#0a0a0f;border:2px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;text-align:right;outline:none;-webkit-appearance:none}
.ir input:focus{border-color:var(--accent)}
.ir .u{font-size:13px;color:var(--dim);width:16px;font-weight:700}

.btn{width:100%;padding:14px;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-b{background:var(--accent);color:#fff}
.btn-d{background:var(--card2);color:var(--dim);border:1px solid var(--border)}
.btn-r{background:#1a0a0a;color:var(--red);border:1px solid var(--red)}
.btn-fetch{background:#1a1a2a;color:var(--accent);border:1px solid var(--accent);font-size:12px;padding:10px}
.btn-bt{background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;text-decoration:none;display:block;text-align:center}

.loc-box{background:var(--card2);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.loc-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:12px}
.order{border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border)}
.order.buy{background:#001a0f11;border-color:#22c55e33}
.order.sell-top{background:#1a0a1f11;border-color:#a78bfa33;border-left:3px solid var(--top)}
.order.sell-mid{background:#0a0a1f11;border-color:#3b82f633;border-left:3px solid var(--mid)}
.order.sell-bot{background:#001a0f11;border-color:#22c55e33;border-left:3px solid var(--bot)}
.order .lbl{font-size:10px;color:var(--dim);font-weight:700;letter-spacing:1px}
.order .val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;color:var(--text);margin-top:3px}
.order .desc{font-size:11px;color:var(--dim);margin-top:4px}

.tier-item{background:#0a0a0f;border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}
.tier-item .top-row{display:flex;justify-content:space-between;align-items:center}
.tier-item .tid{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);font-weight:700}
.tier-item .info{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--text)}
.tier-item .meta{font-size:11px;color:var(--dim);margin-top:4px;font-family:'JetBrains Mono',monospace}
.tier-item .pnl{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:800}
.tier-item .pnl.up{color:var(--green)}
.tier-item .pnl.dn{color:var(--red)}
.tier-item.zone-top{border-left:3px solid var(--top)}
.tier-item.zone-mid{border-left:3px solid var(--mid)}
.tier-item.zone-bot{border-left:3px solid var(--bot)}

.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.sb{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.sb .v{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:800}
.sb .l{font-size:10px;color:var(--dim);margin-top:2px;font-weight:600}

.warn{background:#1a0a0a;border:1px solid var(--red);border-radius:12px;padding:14px;color:var(--red);font-weight:700;text-align:center;font-size:13px}
.footer{text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:#333;margin-top:20px;letter-spacing:1px}
</style>
</head>
<body>
<div class="hdr">
  <h1>SOXL <span>HUNTER</span> v8</h1>
  <div class="stats">3구간 자동전환 · CAGR +102% · MDD -51% · 137배</div>
</div>

<div class="zone-bar" id="zone-bar">
  <div class="zone-box" id="zbox-top">
    천장
    <div class="pct">+2.5% / 7일</div>
    <div class="rule">-10% 이내</div>
  </div>
  <div class="zone-box" id="zbox-mid">
    중간
    <div class="pct">+0.5% / 7일</div>
    <div class="rule">-10~-15%</div>
  </div>
  <div class="zone-box" id="zbox-bot">
    바닥
    <div class="pct">+3% / 10일</div>
    <div class="rule">-15% 이상</div>
  </div>
</div>

<div class="status-card" id="status">
  <div class="title">📊 현재 상태</div>
  <div id="status-body"></div>
</div>

<div class="tabs">
  <button class="tab" id="tab-m" onclick="sw('m')">매매</button>
  <button class="tab on" id="tab-t" onclick="sw('t')">티어</button>
  <button class="tab" id="tab-h" onclick="sw('h')">기록</button>
  <button class="tab" id="tab-g" onclick="sw('g')">가이드</button>
</div>

<div id="body"></div>

<a href="bt.html" class="btn btn-bt">📊 백테스트 페이지로!</a>

<div class="footer">SOXL HUNTER v8 · 3구간 자동전환</div>

<script>
// 설정 (HUNTER v8 안전 3구간)
const TU = 20;
const UP = 2;
const DN = 4;

const ZONES = {
  top: {tp: 0.025, fd: 7, label:'천장', color:'top'},
  mid: {tp: 0.005, fd: 7, label:'중간', color:'mid'},
  bot: {tp: 0.030, fd: 10, label:'바닥', color:'bot'}
};

const TOP_TH = -10;
const BOT_TH = -15;

// 상태
let tab = 't';
let seed = parseFloat(localStorage.getItem('v8-seed') || '30000');
let curPrice = parseFloat(localStorage.getItem('v8-price') || '0');
let high20 = parseFloat(localStorage.getItem('v8-high20') || '0');
let pos = JSON.parse(localStorage.getItem('v8-pos') || '[]');
let hist = JSON.parse(localStorage.getItem('v8-hist') || '[]');

const $ = id => document.getElementById(id);
const gv = id => parseFloat($(id).value) || 0;
const save = () => {
  localStorage.setItem('v8-seed', seed);
  localStorage.setItem('v8-price', curPrice);
  localStorage.setItem('v8-high20', high20);
  localStorage.setItem('v8-pos', JSON.stringify(pos));
  localStorage.setItem('v8-hist', JSON.stringify(hist));
};
const td = () => new Date().toISOString().slice(0,10);
const db = (a,b) => { 
  const d1=new Date(a), d2=new Date(b); 
  let days=0, cur=new Date(d1);
  while(cur<d2) { cur.setDate(cur.getDate()+1); if(cur.getDay()!==0&&cur.getDay()!==6) days++; }
  return days;
};

function getZone() {
  if (!curPrice || !high20) return 'top';
  const dd = (curPrice - high20) / high20 * 100;
  if (dd >= TOP_TH) return 'top';
  if (dd <= BOT_TH) return 'bot';
  return 'mid';
}

function zoneDesc() {
  const z = getZone();
  const dd = high20 ? ((curPrice-high20)/high20*100).toFixed(1) : 0;
  return {zone: z, dd: dd, label: ZONES[z].label};
}

function sw(t) {
  tab = t;
  document.querySelectorAll('.tab').forEach((b, i) => {
    b.classList.toggle('on', ['m','t','h','g'][i]===t);
  });
  render();
}

function renderZones() {
  const z = getZone();
  ['top','mid','bot'].forEach(x => {
    const el = $('zbox-'+x);
    if (x===z) {
      el.className = 'zone-box on on-'+x;
    } else {
      el.className = 'zone-box';
    }
  });
}

function renderStatus() {
  const z = zoneDesc();
  const uw = seed/TU;
  const ti = pos.reduce((a,p) => a+p.u, 0);
  const rem = TU - ti;
  let h = `
    <div class="status-row"><span class="k">시드</span><span class="v">$${seed.toLocaleString()}</span></div>
    <div class="status-row"><span class="k">유닛 단위</span><span class="v">$${uw.toFixed(0)}</span></div>
    <div class="status-row"><span class="k">현재가</span><span class="v">$${curPrice||'--'}</span></div>
    <div class="status-row"><span class="k">20일 전고</span><span class="v">$${high20||'--'}</span></div>
    <div class="status-row"><span class="k">전고 대비</span><span class="v zone-${z.zone}">${z.dd>0?'+':''}${z.dd}%</span></div>
    <div class="status-row"><span class="k">구간</span><span class="v zone-${z.zone}">${z.label} 🎯</span></div>
    <div class="status-row"><span class="k">투입 유닛</span><span class="v">${ti}/${TU} (${rem}u 남음)</span></div>
  `;
  $('status-body').innerHTML = h;
}

// 핵심 수정: render 시 input 포커스 유지!
let activeInputId = null;
let activeInputCursor = 0;

function saveActiveInput() {
  const ae = document.activeElement;
  if (ae && ae.tagName === 'INPUT') {
    activeInputId = ae.id;
    activeInputCursor = ae.selectionStart;
  } else {
    activeInputId = null;
  }
}

function restoreActiveInput() {
  if (activeInputId) {
    const el = document.getElementById(activeInputId);
    if (el) {
      el.focus();
      try {
        if (el.type !== 'number') {
          el.setSelectionRange(activeInputCursor, activeInputCursor);
        }
      } catch(e) {}
    }
  }
}

function render() {
  saveActiveInput();
  renderZones();
  renderStatus();
  
  const body = $('body');
  let h = '';
  
  if (tab === 'm') {
    const z = zoneDesc();
    const zcfg = ZONES[z.zone];
    const ti = pos.reduce((a,p) => a+p.u, 0);
    const rem = TU - ti;
    const uw = seed/TU;
    
    h += `<div class="card">
      <div class="ct">설정</div>
      <div class="ir"><label>시드</label><input type="number" id="seed-in" value="${seed}" onchange="updSeed()"><span class="u">$</span></div>
      <div class="ir"><label>현재가</label><input type="number" step="0.01" id="cp" value="${curPrice||''}" onchange="updPrice()"><span class="u">$</span></div>
      <div class="ir"><label>20일 전고</label><input type="number" step="0.01" id="h20" value="${high20||''}" onchange="updHigh()"><span class="u">$</span></div>
      <button class="btn btn-fetch" onclick="fetchAuto()">🔄 야후에서 자동 가져오기</button>
    </div>`;
    
    if (rem > 0) {
      const loc1 = (curPrice * 1.15).toFixed(2);
      const loc2 = (curPrice - 0.01).toFixed(2);
      const sUp = curPrice ? Math.floor(UP * uw / curPrice) : 0;
      const sDn = curPrice ? Math.floor(DN * uw / curPrice) : 0;
      const sDnX = sDn - sUp;
      
      h += `<div class="loc-box">
        <div class="loc-title">📋 매수 LOC (${z.label} 구간)</div>
        <div class="order buy">
          <div class="lbl">① 무조건 매수</div>
          <div class="val">LOC 매수 ${sUp}주 @ $${loc1}</div>
          <div class="desc">${UP}유닛 · 전날×1.15</div>
        </div>
        <div class="order buy">
          <div class="lbl">② 하락 추가</div>
          <div class="val">LOC 매수 ${sDnX}주 @ $${loc2}</div>
          <div class="desc">${DN-UP}유닛 · 전날-$0.01</div>
        </div>
      </div>`;
    } else {
      h += `<div class="warn">⚠️ ${TU}u MAX — 매수 불가</div>`;
    }
    
    if (pos.length > 0) {
      h += `<div class="loc-box">
        <div class="loc-title">💰 매도 LOC (구간별)</div>`;
      
      pos.forEach((p, idx) => {
        const pz = ZONES[p.z];
        const sellPrice = (p.e * (1+pz.tp)).toFixed(2);
        const days = db(p.d, td());
        const rm = pz.fd - days;
        const isForce = days >= pz.fd;
        const cls = `sell-${p.z}`;
        
        if (isForce) {
          h += `<div class="order" style="border-left:3px solid var(--red);background:rgba(239,68,68,0.08)">
            <div class="lbl" style="color:var(--red)">⚠️ T${idx+1} 강제매도! (${pz.fd}일 초과)</div>
            <div class="val">MOC 매도 ${p.s}주</div>
            <div class="desc">매수 $${p.e} · ${days}일 경과 · ${pz.label}</div>
          </div>`;
        } else {
          h += `<div class="order ${cls}">
            <div class="lbl">T${idx+1} 매도 LOC (${pz.label} +${(pz.tp*100).toFixed(1)}%)</div>
            <div class="val">LOC 매도 ${p.s}주 @ $${sellPrice}</div>
            <div class="desc">매수 $${p.e} · D+${days} · 잔여 ${rm}일 · ${pz.label}</div>
          </div>`;
        }
      });
      h += `</div>`;
    }
    
    if (rem > 0) {
      h += `<div class="card">
        <div class="ct">체결 기록 (매수)</div>
        <div class="ir"><label>체결가</label><input type="number" step="0.01" id="fp" placeholder="$" onchange="upFill()"><span class="u">$</span></div>
        <div class="ir"><label>유닛</label><input type="number" id="fu" value="${UP}" onchange="upFill()"><span class="u">u</span></div>
        <div class="ir"><label>주수</label><input type="number" id="fs" placeholder="자동계산"><span class="u">주</span></div>
        <div id="fi" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim);margin:8px 0;padding:10px;background:#0a0a0f;border-radius:8px"></div>
        <button class="btn btn-b" onclick="doBuy()">T${pos.length+1} 기록</button>
      </div>`;
    }
  }
  
  if (tab === 't') {
    if (pos.length === 0) {
      h += `<div class="card" style="text-align:center;color:var(--dim);padding:40px 20px">
        보유 티어가 없습니다<br><small>매매 탭에서 체결을 기록하세요</small>
      </div>`;
    } else {
      h += `<div class="card">
        <div class="ct">보유 티어 (${pos.length}개)</div>`;
      pos.forEach((p, idx) => {
        const pz = ZONES[p.z];
        const sellPrice = (p.e * (1+pz.tp)).toFixed(2);
        const days = db(p.d, td());
        const rm = pz.fd - days;
        const pnl = curPrice ? ((curPrice - p.e)/p.e*100).toFixed(1) : 0;
        const cls = pnl >= 0 ? 'up' : 'dn';
        
        h += `<div class="tier-item zone-${p.z}">
          <div class="top-row">
            <div>
              <span class="tid">T${idx+1}</span>
              <span class="info">${p.s}주@$${p.e} (${p.u}u)</span>
            </div>
            <div class="pnl ${cls}">${pnl>=0?'+':''}${pnl}%</div>
          </div>
          <div class="meta">${p.d} · D+${days} · 잔여${rm}일 · ${pz.label} · 매도$${sellPrice}</div>
        </div>`;
      });
      
      const ti = pos.reduce((a,p) => a+p.u, 0);
      const ts = pos.reduce((a,p) => a+p.s, 0);
      h += `<div style="text-align:center;padding:8px;color:var(--dim);font-size:12px;margin-top:8px">
        ${ti}/${TU}u · 총 ${ts}주
      </div></div>`;
    }
    
    const tpnl = pos.reduce((a,p) => a+((curPrice-p.e)/p.e*p.u/TU*100), 0);
    const ts = hist.filter(x => x.a === 'S');
    const tw = ts.filter(x => x.pnl >= 0).length;
    
    h += `<div class="sg">
      <div class="sb"><div class="v">${pos.reduce((a,p) => a+p.u, 0)}/${TU}</div><div class="l">투입</div></div>
      <div class="sb"><div class="v" style="color:${tpnl>=0?'var(--green)':'var(--red)'}">${tpnl>=0?'+':''}${tpnl.toFixed(1)}%</div><div class="l">미실현</div></div>
      <div class="sb"><div class="v">${pos.length}</div><div class="l">보유</div></div>
      <div class="sb"><div class="v">${tw}/${ts.length}</div><div class="l">승/매도</div></div>
    </div>`;
  }
  
  if (tab === 'h') {
    if (hist.length === 0) {
      h += `<div class="card" style="text-align:center;color:var(--dim);padding:40px 20px">
        매매 기록이 없습니다
      </div>`;
    } else {
      h += `<div class="card"><div class="ct">매매 기록 (최근 30)</div>`;
      hist.slice(-30).reverse().forEach(r => {
        const pnl = r.pnl || 0;
        const cls = pnl >= 0 ? 'up' : 'dn';
        const act = r.a === 'B' ? '매수' : '매도';
        h += `<div style="padding:8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-size:12px">
          <span><b>${r.d}</b> · ${act} · ${r.s}주@$${r.e}${r.z?' · '+ZONES[r.z].label:''}</span>
          ${r.a==='S' ? `<span class="pnl ${cls}" style="font-family:'JetBrains Mono',monospace;font-weight:700">${pnl>=0?'+':''}${pnl.toFixed(1)}%</span>` : ''}
        </div>`;
      });
      h += `</div>`;
      h += `<button class="btn btn-r" onclick="clearHist()">⚠️ 기록 초기화</button>`;
    }
  }
  
  if (tab === 'g') {
    h += `<div class="card">
      <div class="ct">SOXL HUNTER v8 가이드</div>
      <div style="font-size:13px;line-height:1.8">
        <p><b style="color:var(--accent)">📋 3구간 자동 전환</b><br>
        20일 전고점 대비 현재가 낙폭으로 구간 판정:</p>
        <ul style="list-style:none;margin:10px 0;padding-left:10px">
          <li style="color:var(--top)"><b>🟣 천장</b>: -10% 이내<br>
            <small style="color:var(--dim)">매도 +2.5% / 7일 강제</small></li>
          <li style="color:var(--mid);margin-top:8px"><b>🔵 중간</b>: -10~-15%<br>
            <small style="color:var(--dim)">매도 +0.5% / 7일 강제 (빨리 탈출!)</small></li>

            <small style="color:var(--dim)">매도 +3% / 10일 강제 (크게 먹기!)</small></li>
        </ul>
        
        <p style="margin-top:16px"><b style="color:var(--accent)">📈 매수 (TU20)</b><br>
        상승일 2u, 하락일 4u</p>
        <ul style="list-style:none;margin:10px 0;padding-left:10px;font-size:12px">
          <li>① 전날종가×1.15 LOC → 2주</li>
          <li>② 전날종가-$0.01 LOC → 2주 (하락만)</li>
        </ul>
        
        <p style="margin-top:16px"><b style="color:var(--green)">🏆 백테 (2020~2026)</b></p>
        <ul style="list-style:none;font-size:12px;color:var(--dim)">
          <li>✅ CAGR +102%</li>
          <li>✅ MDD -51%</li>
          <li>✅ 137배!</li>
          <li>✅ 2022 +29% (폭락장!)</li>
          <li>✅ 손실 0년</li>

        • 바닥 매수는 손실 클 수 있음<br>

      </div>
    </div>`;
  }
  
  body.innerHTML = h;
  
  // 입력 포커스 복원!
  setTimeout(() => restoreActiveInput(), 0);
}

function updSeed() { 
  const v = gv('seed-in');
  if (v > 0) seed = v; 
  save(); 
  render(); 
}
function updPrice() { 
  const v = gv('cp');
  curPrice = v; 
  save(); 
  render(); 
}
function updHigh() { 
  const v = gv('h20');
  high20 = v; 
  save(); 
  render(); 
}

function upFill() {
  const fp = gv('fp'), fu = gv('fu');
  if (!fp) return;
  const uw = seed/TU;
  const shares = Math.floor(fu * uw / fp);
  if ($('fs')) $('fs').value = shares;
  const z = zoneDesc();
  const pz = ZONES[z.zone];
  const sell = (fp * (1+pz.tp)).toFixed(2);
  $('fi').innerHTML = `유닛당 $${uw.toFixed(0)} · ${fu}u = $${(fu*uw).toFixed(0)} · ${shares}주<br>
    구간: <b style="color:var(--${z.zone})">${pz.label}</b> · 매도 <b>$${sell}</b> (+${(pz.tp*100).toFixed(1)}%) · 강제 ${pz.fd}일`;
}

function doBuy() {
  const fp = gv('fp'), fu = gv('fu'), fs = gv('fs');
  if (!fp || !fu || !fs) return alert('체결 정보를 입력하세요');
  const z = getZone();
  pos.push({e: fp, u: fu, s: fs, d: td(), z: z});
  hist.push({a:'B', d: td(), e: fp, u: fu, s: fs, z: z});
  save();
  alert(`T${pos.length} 기록 완료!\n${fs}주 @ $${fp} (${ZONES[z].label})`);
  sw('t');
}

function clearHist() {
  if (!confirm('기록을 초기화하시겠습니까?')) return;
  hist = [];
  save();
  render();
}

async function fetchAuto() {
  try {
    const res = await fetch('/api/quote');
    const data = await res.json();
    if (data.price) {
      curPrice = data.price;
    }
    if (data.high20) {
      high20 = data.high20;
    }
    save();
    render();
    alert(`자동 업데이트!\n현재가: $${curPrice}\n20일 전고: $${high20}\n구간: ${ZONES[getZone()].label}`);
  } catch(e) {
    alert('자동 가져오기 실패.\n수동으로 입력해주세요.');
  }
}

render();
</script>
</body>
</html>
