<script>
const PRESETS = {
  balanced: { sellRsi1: 70, sellPct1: 20, sellRsi2: 85, sellPct2: 30, buyRsi1: 30, buyPct1: 30, buyRsi2: 20, buyPct2: 50, initEntry: 50, cooldown: 3 },
  aggressive: { sellRsi1: 65, sellPct1: 25, sellRsi2: 80, sellPct2: 40, buyRsi1: 35, buyPct1: 35, buyRsi2: 25, buyPct2: 60, initEntry: 40, cooldown: 2 },
  conservative: { sellRsi1: 75, sellPct1: 15, sellRsi2: 90, sellPct2: 25, buyRsi1: 25, buyPct1: 25, buyRsi2: 15, buyPct2: 40, initEntry: 60, cooldown: 5 },
  extreme: { sellRsi1: 80, sellPct1: 30, sellRsi2: 95, sellPct2: 50, buyRsi1: 25, buyPct1: 40, buyRsi2: 15, buyPct2: 70, initEntry: 30, cooldown: 2 }
};

function applyPreset(name) {
  const p = PRESETS[name];
  document.querySelectorAll('.preset').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  Object.keys(p).forEach(k => {
    const el = document.getElementById(k);
    if (el) {
      el.value = p[k];
      if (k.startsWith('sellPct') || k.startsWith('buyPct')) {
        const disp = document.getElementById(k + 'Disp');
        if (disp) disp.textContent = p[k];
      }
    }
  });
}

// Wilder's RSI 계산
function calculateRSI(prices, period = 14) {
  if (prices.length < period + 1) return [];
  const rsi = new Array(period).fill(null);
  
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const d = prices[i] - prices[i-1];
    if (d > 0) gains += d;
    else losses -= d;
  }
  let avgGain = gains / period;
  let avgLoss = losses / period;
  
  rsi.push(avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss)));
  
  for (let i = period + 1; i < prices.length; i++) {
    const d = prices[i] - prices[i-1];
    const gain = d > 0 ? d : 0;
    const loss = d < 0 ? -d : 0;
    avgGain = (avgGain * (period - 1) + gain) / period;
    avgLoss = (avgLoss * (period - 1) + loss) / period;
    rsi.push(avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss)));
  }
  return rsi;
}

async function fetchData(symbol, startDate) {
  // Vercel 서버 프록시 사용 (CORS 우회)
  const url = `/api/quote-history?symbol=${encodeURIComponent(symbol)}&from=${encodeURIComponent(startDate)}`;
  
  try {
    const res = await fetch(url);
    const data = await res.json();
    
    if (!res.ok || data.error) {
      throw new Error(data.detail || data.error || `HTTP ${res.status}`);
    }
    
    if (!data.bars || data.bars.length === 0) {
      throw new Error(`${symbol} 데이터 없음 (기간: ${startDate} ~ 현재)`);
    }
    
    return data.bars;
  } catch (err) {
    throw new Error(`데이터 조회 실패: ${err.message}`);
  }
}

let lastBacktestResult = null;

async function runBacktest() {
  const btn = document.querySelector('.btn');
  btn.disabled = true;
  btn.textContent = '⏳ 실행 중...';
  
  const resultDiv = document.getElementById('result');
  resultDiv.innerHTML = '<div class="loader-wrap"><span class="loader"></span>POET 데이터 조회 중...</div>';
  
  const params = {
    symbol: document.getElementById('symbol').value.toUpperCase(),
    startDate: document.getElementById('startDate').value,
    seed: parseFloat(document.getElementById('seed').value),
    initEntry: parseFloat(document.getElementById('initEntry').value) / 100,
    rsiPeriod: parseInt(document.getElementById('rsiPeriod').value),
    sellRsi1: parseFloat(document.getElementById('sellRsi1').value),
    sellPct1: parseFloat(document.getElementById('sellPct1').value) / 100,
    sellRsi2: parseFloat(document.getElementById('sellRsi2').value),
    sellPct2: parseFloat(document.getElementById('sellPct2').value) / 100,
    buyRsi1: parseFloat(document.getElementById('buyRsi1').value),
    buyPct1: parseFloat(document.getElementById('buyPct1').value) / 100,
    buyRsi2: parseFloat(document.getElementById('buyRsi2').value),
    buyPct2: parseFloat(document.getElementById('buyPct2').value) / 100,
    cooldown: parseInt(document.getElementById('cooldown').value)
  };
  
  try {
    const bars = await fetchData(params.symbol, params.startDate);
    if (bars.length < params.rsiPeriod + 5) {
      throw new Error(`데이터 부족 (${bars.length}일)`);
    }
    
    resultDiv.innerHTML = '<div class="loader-wrap"><span class="loader"></span>백테스트 실행 중...</div>';
    await new Promise(r => setTimeout(r, 50));
    
    const result = backtest(bars, params);
    lastBacktestResult = result;
    render(result, params);
  } catch (err) {
    resultDiv.innerHTML = `<div class="error">❌ ${err.message}<br><br>
      <small>야후 API CORS 이슈라면 브라우저 콘솔 확인. 또는 CORS 프록시가 필요할 수 있습니다.</small>
    </div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '🚀 백테스트 실행';
  }
}

function backtest(bars, p) {
  const closes = bars.map(b => b.close);
  const rsi = calculateRSI(closes, p.rsiPeriod);
  
  // 시작점: RSI 계산 끝난 후부터
  const startIdx = p.rsiPeriod;
  
  // 초기 진입
  const firstPrice = bars[startIdx].close;
  let cash = p.seed * (1 - p.initEntry);
  let shares = Math.floor((p.seed * p.initEntry) / firstPrice);
  cash += p.seed * p.initEntry - shares * firstPrice;  // 매수 후 잔여
  
  const trades = [{
    date: bars[startIdx].date,
    action: 'BUY',
    price: firstPrice,
    shares: shares,
    cash: cash,
    totalValue: cash + shares * firstPrice,
    rsi: rsi[startIdx] || 50,
    reason: 'INITIAL_ENTRY'
  }];
  
  let lastTradeIdx = startIdx;
  const equityCurve = [{ date: bars[startIdx].date, value: cash + shares * firstPrice, shares: shares }];
  
  // 메인 루프
  for (let i = startIdx + 1; i < bars.length; i++) {
    const price = bars[i].close;
    const currentRsi = rsi[i];
    if (currentRsi == null) continue;
    
    const daysSinceTrade = i - lastTradeIdx;
    if (daysSinceTrade < p.cooldown) {
      equityCurve.push({ date: bars[i].date, value: cash + shares * price, shares });
      continue;
    }
    
    let traded = false;
    
    // ----- 매도 조건 -----
    if (shares > 0) {
      if (currentRsi >= p.sellRsi2) {
        // 매도2: 보유의 (pct2) % 매도
        const sellQty = Math.floor(shares * p.sellPct2);
        if (sellQty > 0) {
          cash += sellQty * price;
          shares -= sellQty;
          trades.push({
            date: bars[i].date, action: 'SELL', price: price, shares: sellQty,
            cash: cash, totalValue: cash + shares * price, rsi: currentRsi,
            reason: `RSI>=${p.sellRsi2}`
          });
          lastTradeIdx = i;
          traded = true;
        }
      } else if (currentRsi >= p.sellRsi1) {
        const sellQty = Math.floor(shares * p.sellPct1);
        if (sellQty > 0) {
          cash += sellQty * price;
          shares -= sellQty;
          trades.push({
            date: bars[i].date, action: 'SELL', price: price, shares: sellQty,
            cash: cash, totalValue: cash + shares * price, rsi: currentRsi,
            reason: `RSI>=${p.sellRsi1}`
          });
          lastTradeIdx = i;
          traded = true;
        }
      }
    }
    
    // ----- 매수 조건 -----
    if (!traded && cash > price) {
      if (currentRsi <= p.buyRsi2) {
        const buyBudget = cash * p.buyPct2;
        const buyQty = Math.floor(buyBudget / price);
        if (buyQty > 0) {
          cash -= buyQty * price;
          shares += buyQty;
          trades.push({
            date: bars[i].date, action: 'BUY', price: price, shares: buyQty,
            cash: cash, totalValue: cash + shares * price, rsi: currentRsi,
            reason: `RSI<=${p.buyRsi2}`
          });
          lastTradeIdx = i;
        }
      } else if (currentRsi <= p.buyRsi1) {
        const buyBudget = cash * p.buyPct1;
        const buyQty = Math.floor(buyBudget / price);
        if (buyQty > 0) {
          cash -= buyQty * price;
          shares += buyQty;
          trades.push({
            date: bars[i].date, action: 'BUY', price: price, shares: buyQty,
            cash: cash, totalValue: cash + shares * price, rsi: currentRsi,
            reason: `RSI<=${p.buyRsi1}`
          });
          lastTradeIdx = i;
        }
      }
    }
    
    equityCurve.push({ date: bars[i].date, value: cash + shares * price, shares });
  }
  
  const lastPrice = closes[closes.length - 1];
  const finalValue = cash + shares * lastPrice;
  const initialValue = p.seed;
  
  // Buy & Hold 비교
  const bhShares = Math.floor(p.seed / firstPrice);
  const bhCash = p.seed - bhShares * firstPrice;
  const bhFinalValue = bhCash + bhShares * lastPrice;
  
  // MDD 계산
  let maxEquity = equityCurve[0].value;
  let mdd = 0;
  equityCurve.forEach(e => {
    if (e.value > maxEquity) maxEquity = e.value;
    const dd = (e.value - maxEquity) / maxEquity * 100;
    if (dd < mdd) mdd = dd;
  });
  
  // 연도별 수익률
  const yearlyReturns = {};
  const yearStarts = {};
  equityCurve.forEach(e => {
    const y = e.date.slice(0, 4);
    if (!yearStarts[y]) yearStarts[y] = e.value;
    yearlyReturns[y] = ((e.value - yearStarts[y]) / yearStarts[y] * 100);
  });
  
  return {
    startPrice: firstPrice, lastPrice: lastPrice,
    startDate: bars[startIdx].date, endDate: bars[bars.length-1].date,
    days: bars.length - startIdx,
    cash, shares, finalValue, initialValue,
    totalReturn: (finalValue - initialValue) / initialValue * 100,
    bhShares, bhFinalValue,
    bhReturn: (bhFinalValue - initialValue) / initialValue * 100,
    mdd,
    trades,
    buyCount: trades.filter(t => t.action === 'BUY').length,
    sellCount: trades.filter(t => t.action === 'SELL').length,
    yearlyReturns,
    equityCurve
  };
}

function render(r, p) {
  const shareDelta = r.shares - r.bhShares;
  const valueDelta = r.finalValue - r.bhFinalValue;
  const sharePct = ((r.shares / r.bhShares) - 1) * 100;
  
  let html = '';
  
  // Hero: 수량 증가가 메인 메트릭
  html += `
    <div class="result-hero">
      <div class="label">🎯 최종 보유 주식 수</div>
      <div class="big">${r.shares.toLocaleString()}</div>
      <div class="sub">vs Buy&Hold ${r.bhShares.toLocaleString()}주 (${shareDelta >= 0 ? '+' : ''}${shareDelta.toLocaleString()}주 · ${sharePct >= 0 ? '+' : ''}${sharePct.toFixed(1)}%)</div>
    </div>
  `;
  
  // 비교 박스
  html += `
    <div class="comparison-grid">
      <div class="comp-box strategy">
        <div class="title accent">POET SWING</div>
        <div class="val">$${Math.round(r.finalValue).toLocaleString()}</div>
        <div class="delta ${r.totalReturn >= 0 ? '' : 'dn'}">${r.totalReturn >= 0 ? '+' : ''}${r.totalReturn.toFixed(1)}%</div>
        <div style="font-size:10px;color:var(--dim);margin-top:6px;font-family:'JetBrains Mono',monospace">
          ${r.shares}주 · 현금 $${Math.round(r.cash).toLocaleString()}
        </div>
      </div>
      <div class="comp-box buyhold">
        <div class="title blue">BUY &amp; HOLD</div>
        <div class="val">$${Math.round(r.bhFinalValue).toLocaleString()}</div>
        <div class="delta ${r.bhReturn >= 0 ? '' : 'dn'}">${r.bhReturn >= 0 ? '+' : ''}${r.bhReturn.toFixed(1)}%</div>
        <div style="font-size:10px;color:var(--dim);margin-top:6px;font-family:'JetBrains Mono',monospace">
          ${r.bhShares}주 · 보유만
        </div>
      </div>
    </div>
  `;
  
  // 차이
  const beat = r.totalReturn - r.bhReturn;
  html += `
    <div class="card" style="text-align:center;border-color:${beat >= 0 ? 'var(--green)' : 'var(--red)'}">
      <div class="ct">📊 성과 차이</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:${beat >= 0 ? 'var(--green)' : 'var(--red)'};letter-spacing:2px">
        ${beat >= 0 ? '+' : ''}${beat.toFixed(2)}%p
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);margin-top:4px">
        ${beat >= 0 ? 'POET SWING이 Buy&Hold를 초과' : 'Buy&Hold가 POET SWING보다 우수'}
      </div>
    </div>
  `;
  
  // 핵심 지표
  html += `
    <div class="sg">
      <div class="sb"><div class="v">${r.buyCount}</div><div class="l">매수</div></div>
      <div class="sb"><div class="v">${r.sellCount}</div><div class="l">매도</div></div>
      <div class="sb"><div class="v" style="color:var(--red)">${r.mdd.toFixed(1)}%</div><div class="l">MDD</div></div>
    </div>
    <div class="sg">
      <div class="sb"><div class="v">$${r.startPrice.toFixed(2)}</div><div class="l">시작가</div></div>
      <div class="sb"><div class="v">$${r.lastPrice.toFixed(2)}</div><div class="l">현재가</div></div>
      <div class="sb"><div class="v">${r.days}일</div><div class="l">기간</div></div>
    </div>
  `;
  
  // 연도별
  const years = Object.keys(r.yearlyReturns).sort();
  if (years.length > 1) {
    html += `<div class="card">
      <div class="ct">📅 연도별 수익률</div>
      <div class="yearly-grid">`;
    years.forEach(y => {
      const pct = r.yearlyReturns[y];
      const color = pct >= 0 ? 'var(--green)' : 'var(--red)';
      html += `
        <div class="year-box">
          <div class="y">${y}</div>
          <div class="pct" style="color:${color}">${pct >= 0 ? '+' : ''}${pct.toFixed(0)}%</div>
        </div>
      `;
    });
    html += `</div></div>`;
  }
  
  // 거래 로그
  html += `<div class="card">
    <div class="ct">📝 거래 내역 (${r.trades.length}건)</div>
    <div class="trade-log">
  `;
  r.trades.slice().reverse().forEach(t => {
    html += `
      <div class="trade">
        <span class="date">${t.date}</span>
        <span class="action ${t.action === 'BUY' ? 'buy' : 'sell'}">${t.action}</span>
        <span class="info">${t.shares}주 @ $${t.price.toFixed(2)}</span>
        <span class="rsi">${t.rsi.toFixed(0)}</span>
      </div>
    `;
  });
  html += `</div></div>`;
  
  // 설명
  html += `
    <div class="card">
      <div class="ct">💡 전략 요약</div>
      <div class="explanation">
        <b>POET SWING</b>은 RSI 기반 스윙 트레이딩으로 <b>주식 수량을 축적</b>하는 전략입니다.
        <ul>
          <li>RSI ≥ ${p.sellRsi1*100/100} → 보유 ${p.sellPct1*100}% 매도 (현금화)</li>
          <li>RSI ≥ ${p.sellRsi2*100/100} → 추가 ${p.sellPct2*100}% 매도</li>
          <li>RSI ≤ ${p.buyRsi1*100/100} → 현금 ${p.buyPct1*100}% 매수</li>
          <li>RSI ≤ ${p.buyRsi2*100/100} → 현금 ${p.buyPct2*100}% 매수 (적극)</li>
          <li>최소 거래 간격: ${p.cooldown}일</li>
        </ul>
        <br>
        이 시뮬레이션은 실제 POET 종가 데이터 기반입니다. 변동성이 크고 장기 우상향 예상되는 종목일수록 수량 축적 효과가 큽니다.
      </div>
    </div>
  `;
  
  document.getElementById('result').innerHTML = html;
}
</script>

</body>
</html>
