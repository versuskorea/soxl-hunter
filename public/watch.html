<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WATCH · 관심 종목</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080a;--card:#111118;--card2:#1a1a1f;--border:#222233;
  --accent:#3b82f6;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;
  --purple:#a78bfa;--pink:#ec4899;
  --text:#f0f0f0;--dim:#666;--radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  background-image:
    radial-gradient(circle at 20% 10%,rgba(59,130,246,0.04),transparent 40%),
    radial-gradient(circle at 80% 90%,rgba(167,139,250,0.04),transparent 40%);
  color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
  padding:12px;max-width:520px;margin:0 auto;
}

.hdr{text-align:center;padding:16px 0 12px;position:relative}
.hdr h1{font-family:‘Bebas Neue’,sans-serif;font-size:30px;letter-spacing:4px;background:linear-gradient(90deg,#3b82f6,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr .subtitle{font-family:‘JetBrains Mono’,monospace;font-size:10px;margin-top:4px;color:var(–accent);letter-spacing:2px;font-weight:700}
.hdr .nav{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.nav-link{background:var(–card2);color:var(–accent);padding:5px 10px;border-radius:6px;text-decoration:none;font-size:10px;font-weight:700;border:1px solid var(–border);letter-spacing:0.5px}
.nav-link.active{background:var(–accent);color:#fff}

.status-bar{display:flex;justify-content:space-between;align-items:center;background:var(–card2);border:1px solid var(–border);border-radius:10px;padding:8px 12px;margin-bottom:10px;font-size:11px;font-family:‘JetBrains Mono’,monospace}
.status-bar .left{color:var(–dim)}
.status-bar .live{color:var(–green);display:flex;align-items:center;gap:4px}
.status-bar .live::before{content:‘●’;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

.add-bar{background:var(–card);border:1px solid var(–border);border-radius:12px;padding:10px;margin-bottom:12px;display:flex;gap:8px}
.add-bar input{flex:1;background:#0a0a0f;border:2px solid var(–border);border-radius:8px;padding:10px 12px;color:var(–text);font-family:‘JetBrains Mono’,monospace;font-size:13px;outline:none;text-transform:uppercase;-webkit-appearance:none}
.add-bar input:focus{border-color:var(–accent)}
.add-btn{background:linear-gradient(135deg,#3b82f6,#a78bfa);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:‘DM Sans’,sans-serif}
.add-btn:active{transform:scale(0.95)}

.portfolio-summary{background:linear-gradient(135deg,rgba(59,130,246,0.08),rgba(167,139,250,0.08));border:1px solid var(–accent);border-radius:14px;padding:14px;margin-bottom:12px;text-align:center}
.portfolio-summary .title{font-size:10px;color:var(–dim);letter-spacing:2px;font-weight:700;margin-bottom:4px}
.portfolio-summary .value{font-family:‘JetBrains Mono’,monospace;font-size:26px;font-weight:800;color:var(–text)}
.portfolio-summary .pnl{font-family:‘JetBrains Mono’,monospace;font-size:13px;font-weight:700;margin-top:4px}
.portfolio-summary .pnl.pos{color:var(–green)}
.portfolio-summary .pnl.neg{color:var(–red)}
.portfolio-summary .krw{font-size:11px;color:var(–dim);font-family:‘JetBrains Mono’,monospace;margin-top:2px}

.watchlist{margin-bottom:60px}

.watch-item{background:var(–card);border:1px solid var(–border);border-radius:14px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden;cursor:pointer;transition:all 0.2s}
.watch-item:active{transform:scale(0.99)}
.watch-item.pos{border-left:3px solid var(–green)}
.watch-item.neg{border-left:3px solid var(–red)}
.watch-item.loading{opacity:0.5}

.wi-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.wi-left{flex:1}
.wi-symbol{font-family:‘JetBrains Mono’,monospace;font-size:17px;font-weight:800;color:var(–text);letter-spacing:0.5px}
.wi-name{font-size:10px;color:var(–dim);margin-top:2px;font-weight:500}
.wi-right{text-align:right}
.wi-price{font-family:‘JetBrains Mono’,monospace;font-size:17px;font-weight:800;color:var(–text)}
.wi-change{font-family:‘JetBrains Mono’,monospace;font-size:11px;font-weight:700;margin-top:2px}
.wi-change.pos{color:var(–green)}
.wi-change.neg{color:var(–red)}

.wi-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px}
.wi-stat{background:var(–card2);border-radius:6px;padding:6px 8px;text-align:center}
.wi-stat .l{font-size:9px;color:var(–dim);letter-spacing:0.5px;font-weight:600;text-transform:uppercase}
.wi-stat .v{font-family:‘JetBrains Mono’,monospace;font-size:11px;font-weight:700;margin-top:2px}

.wi-52w{margin-top:8px}
.wi-52w-bar{height:4px;background:var(–card2);border-radius:2px;position:relative;overflow:hidden}
.wi-52w-fill{height:100%;background:linear-gradient(90deg,var(–red),var(–amber),var(–green));border-radius:2px}
.wi-52w-marker{position:absolute;top:-2px;width:2px;height:8px;background:var(–accent);box-shadow:0 0 4px rgba(59,130,246,0.8)}
.wi-52w-labels{display:flex;justify-content:space-between;margin-top:4px;font-size:9px;color:var(–dim);font-family:‘JetBrains Mono’,monospace}

.wi-position{background:rgba(59,130,246,0.05);border:1px solid rgba(59,130,246,0.2);border-radius:8px;padding:8px 10px;margin-top:8px;font-size:11px;font-family:‘JetBrains Mono’,monospace;display:flex;justify-content:space-between;align-items:center}
.wi-position .label{color:var(–dim);font-weight:600}
.wi-position .pnl{font-weight:700}
.wi-position .pnl.pos{color:var(–green)}
.wi-position .pnl.neg{color:var(–red)}

.wi-actions{display:flex;gap:4px;margin-top:10px}
.wi-action{flex:1;background:var(–card2);border:1px solid var(–border);color:var(–accent);text-decoration:none;text-align:center;padding:6px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:0.5px}
.wi-action:active{background:rgba(59,130,246,0.1)}
.wi-action.danger{color:var(–red)}

.empty-state{background:var(–card);border:1px dashed var(–border);border-radius:14px;padding:40px 20px;text-align:center;color:var(–dim)}
.empty-state .icon{font-size:40px;margin-bottom:10px}
.empty-state .title{font-size:15px;color:var(–text);font-weight:700;margin-bottom:6px}
.empty-state .desc{font-size:12px;line-height:1.6}
.empty-state .hint{margin-top:14px;font-size:11px;color:var(–accent);font-family:‘JetBrains Mono’,monospace}

/* Detail Modal */
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal.active{display:flex}
.modal-content{background:var(–card);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;padding:20px;animation:slideUp 0.3s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-close{position:absolute;top:12px;right:14px;background:var(–card2);border:none;color:var(–text);width:32px;height:32px;border-radius:16px;font-size:18px;cursor:pointer;z-index:2}
.modal-title{font-family:‘JetBrains Mono’,monospace;font-size:20px;font-weight:800;margin-bottom:4px}
.modal-subtitle{font-size:11px;color:var(–dim);margin-bottom:16px}

.detail-section{background:var(–card2);border-radius:10px;padding:12px;margin-bottom:10px}
.detail-section .title{font-size:10px;color:var(–accent);letter-spacing:1.5px;font-weight:700;text-transform:uppercase;margin-bottom:8px}
.detail-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px}
.detail-row .k{color:var(–dim)}
.detail-row .v{font-family:‘JetBrains Mono’,monospace;font-weight:700}
.detail-row .v.pos{color:var(–green)}
.detail-row .v.neg{color:var(–red)}

.detail-input-group{margin-top:8px}
.detail-input-group label{display:block;font-size:10px;color:var(–dim);margin-bottom:4px;font-weight:600;letter-spacing:0.5px}
.detail-input-group input{width:100%;background:#0a0a0f;border:2px solid var(–border);border-radius:8px;padding:10px 12px;color:var(–text);font-family:‘JetBrains Mono’,monospace;font-size:13px;outline:none;-webkit-appearance:none}
.detail-input-group input:focus{border-color:var(–accent)}

.detail-btn{width:100%;background:linear-gradient(135deg,#3b82f6,#a78bfa);color:#fff;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px;font-family:‘DM Sans’,sans-serif}
.detail-btn.danger{background:rgba(239,68,68,0.1);color:var(–red);border:1px solid var(–red)}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(–card);border:1px solid var(–accent);border-radius:10px;padding:10px 16px;font-size:13px;z-index:200;display:none}
.toast.active{display:block;animation:toastIn 0.3s}
.toast.error{border-color:var(–red);color:var(–red)}
@keyframes toastIn{from{transform:translate(-50%,-20px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
</style>

</head>
<body>

<div class="hdr">
  <h1>👀 WATCH</h1>
  <div class="subtitle">MY WATCHLIST · LIVE</div>
  <div class="nav">
    <a href="/" class="nav-link">← HOME</a>
    <a href="/hunter.html" class="nav-link">HUNTER</a>
    <a href="/bt.html" class="nav-link">BT</a>
    <a href="/scanner.html" class="nav-link">SCAN</a>
    <a href="/watch.html" class="nav-link active">WATCH</a>
  </div>
</div>

<div class="status-bar">
  <span class="left" id="statusLeft">로딩 중...</span>
  <span class="live" id="statusLive">LIVE</span>
</div>

<div id="portfolioSummary" class="portfolio-summary" style="display:none">
  <div class="title">💼 포트폴리오 평가액</div>
  <div class="value" id="totalValue">$0</div>
  <div class="pnl" id="totalPnl">+$0 (+0%)</div>
  <div class="krw" id="totalKrw">0원</div>
</div>

<div class="add-bar">
  <input type="text" id="symbolInput" placeholder="종목 추가 (예: SOXL)" autocomplete="off" autocapitalize="characters">
  <button class="add-btn" onclick="addSymbol()">+</button>
</div>

<div id="watchlist" class="watchlist"></div>

<!-- 종목 상세 모달 -->

<div id="detailModal" class="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modalBody"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ==================== 상태 관리 ====================
const STORAGE_KEY = 'apple_watchlist_v1';
const FX_KEY = 'apple_fx_rate';
let watchlist = loadWatchlist();
let refreshInterval = null;
let currentSymbol = null;
let fxRate = parseFloat(localStorage.getItem(FX_KEY)) || 1400;

function loadWatchlist() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (!data) return defaultWatchlist();
    return JSON.parse(data);
  } catch (e) {
    return defaultWatchlist();
  }
}

function defaultWatchlist() {
  // 애플님 관심종목 기본값
  return [
    { symbol: 'SOXL', buyPrice: null, shares: null },
    { symbol: 'UCO', buyPrice: null, shares: null },
    { symbol: 'NRGU', buyPrice: null, shares: null },
    { symbol: 'POET', buyPrice: null, shares: null },
  ];
}

function saveWatchlist() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(watchlist));
}

// ==================== 데이터 fetch ====================
async function fetchQuote(symbol) {
  try {
    const res = await fetch(`/api/quote-full?symbol=${encodeURIComponent(symbol)}`);
    const data = await res.json();
    if (!res.ok || data.error) {
      throw new Error(data.error || `HTTP ${res.status}`);
    }
    return data;
  } catch (err) {
    return { error: err.message, symbol };
  }
}

async function refreshAll() {
  if (watchlist.length === 0) return;
  
  const listEl = document.getElementById('watchlist');
  
  // 로딩 표시
  document.querySelectorAll('.watch-item').forEach(el => el.classList.add('loading'));
  
  // 병렬 fetch
  const results = await Promise.all(
    watchlist.map(item => fetchQuote(item.symbol))
  );
  
  // 데이터 병합
  const items = watchlist.map((w, idx) => ({
    ...w,
    quote: results[idx]
  }));
  
  renderList(items);
  renderPortfolio(items);
  updateStatus();
}

// ==================== 렌더링 ====================
function renderList(items) {
  const listEl = document.getElementById('watchlist');
  
  if (items.length === 0) {
    listEl.innerHTML = `
      <div class="empty-state">
        <div class="icon">📈</div>
        <div class="title">관심종목이 비었어요</div>
        <div class="desc">위 검색창에 종목 티커를 입력해보세요.<br>예: SOXL, UCO, NRGU, NVDA</div>
        <div class="hint">💡 종목을 추가하면 실시간으로 추적됩니다</div>
      </div>
    `;
    return;
  }
  
  listEl.innerHTML = items.map((item, idx) => {
    if (item.quote.error) {
      return `
        <div class="watch-item" style="border-left:3px solid var(--amber)">
          <div class="wi-header">
            <div class="wi-left">
              <div class="wi-symbol">${item.symbol}</div>
              <div class="wi-name" style="color:var(--amber)">⚠️ ${item.quote.error}</div>
            </div>
            <div class="wi-right">
              <button class="add-btn" style="background:var(--red);padding:6px 12px;font-size:11px" onclick="event.stopPropagation();removeSymbol(${idx})">삭제</button>
            </div>
          </div>
        </div>
      `;
    }
    
    const q = item.quote;
    const posClass = q.changePercent >= 0 ? 'pos' : 'neg';
    const changeSign = q.changePercent >= 0 ? '+' : '';
    
    // 52주 위치 계산
    const range = q.high52 - q.low52;
    const pos52 = range > 0 ? ((q.price - q.low52) / range) * 100 : 50;
    
    // 포지션 손익
    let positionHtml = '';
    if (item.buyPrice && item.shares) {
      const costBasis = item.buyPrice * item.shares;
      const currentValue = q.price * item.shares;
      const pnl = currentValue - costBasis;
      const pnlPct = (pnl / costBasis) * 100;
      const pnlClass = pnl >= 0 ? 'pos' : 'neg';
      const pnlSign = pnl >= 0 ? '+' : '';
      
      positionHtml = `
        <div class="wi-position">
          <span class="label">${item.shares}주 × $${item.buyPrice.toFixed(2)}</span>
          <span class="pnl ${pnlClass}">${pnlSign}$${Math.abs(pnl).toFixed(0)} (${pnlSign}${pnlPct.toFixed(1)}%)</span>
        </div>
      `;
    }
    
    return `
      <div class="watch-item ${posClass}" onclick="openDetail('${item.symbol}')">
        <div class="wi-header">
          <div class="wi-left">
            <div class="wi-symbol">${q.symbol}</div>
            <div class="wi-name">${truncate(q.longName, 40)}</div>
          </div>
          <div class="wi-right">
            <div class="wi-price">$${formatPrice(q.price)}</div>
            <div class="wi-change ${posClass}">${changeSign}${q.change.toFixed(2)} (${changeSign}${q.changePercent.toFixed(2)}%)</div>
          </div>
        </div>
        
        <div class="wi-stats">
          <div class="wi-stat">
            <div class="l">시가총액</div>
            <div class="v">${formatMarketCap(q.marketCap)}</div>
          </div>
          <div class="wi-stat">
            <div class="l">거래량</div>
            <div class="v">${formatVolume(q.volume)}</div>
          </div>
          <div class="wi-stat">
            <div class="l">52주 위치</div>
            <div class="v" style="color:${pos52 >= 80 ? 'var(--green)' : pos52 <= 20 ? 'var(--red)' : 'var(--amber)'}">${pos52.toFixed(0)}%</div>
          </div>
        </div>
        
        <div class="wi-52w">
          <div class="wi-52w-bar">
            <div class="wi-52w-fill"></div>
            <div class="wi-52w-marker" style="left:${pos52}%"></div>
          </div>
          <div class="wi-52w-labels">
            <span>Low $${q.low52?.toFixed(2) || '-'}</span>
            <span>High $${q.high52?.toFixed(2) || '-'}</span>
          </div>
        </div>
        
        ${positionHtml}
      </div>
    `;
  }).join('');
}

function renderPortfolio(items) {
  const hasPositions = items.some(i => i.buyPrice && i.shares && !i.quote.error);
  
  if (!hasPositions) {
    document.getElementById('portfolioSummary').style.display = 'none';
    return;
  }
  
  let totalCost = 0;
  let totalValue = 0;
  
  items.forEach(item => {
    if (item.buyPrice && item.shares && !item.quote.error) {
      totalCost += item.buyPrice * item.shares;
      totalValue += item.quote.price * item.shares;
    }
  });
  
  const pnl = totalValue - totalCost;
  const pnlPct = totalCost > 0 ? (pnl / totalCost) * 100 : 0;
  const pnlClass = pnl >= 0 ? 'pos' : 'neg';
  const pnlSign = pnl >= 0 ? '+' : '';
  
  document.getElementById('totalValue').textContent = `$${totalValue.toLocaleString('en-US', {maximumFractionDigits:0})}`;
  const pnlEl = document.getElementById('totalPnl');
  pnlEl.textContent = `${pnlSign}$${Math.abs(pnl).toFixed(0)} (${pnlSign}${pnlPct.toFixed(2)}%)`;
  pnlEl.className = `pnl ${pnlClass}`;
  document.getElementById('totalKrw').textContent = `≈ ${(totalValue * fxRate / 10000).toFixed(0)}만원`;
  
  document.getElementById('portfolioSummary').style.display = 'block';
}

function updateStatus() {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('ko-KR', {hour: '2-digit', minute: '2-digit', second: '2-digit'});
  document.getElementById('statusLeft').textContent = `업데이트 ${timeStr} · ${watchlist.length}종목`;
}

// ==================== 상세 모달 ====================
async function openDetail(symbol) {
  currentSymbol = symbol;
  const modal = document.getElementById('detailModal');
  const body = document.getElementById('modalBody');
  
  body.innerHTML = `<div style="text-align:center;padding:40px;color:var(--dim)">로딩 중...</div>`;
  modal.classList.add('active');
  
  const q = await fetchQuote(symbol);
  const item = watchlist.find(w => w.symbol === symbol);
  
  if (q.error) {
    body.innerHTML = `
      <div class="modal-title">${symbol}</div>
      <div style="color:var(--red);padding:20px;text-align:center">⚠️ ${q.error}</div>
    `;
    return;
  }
  
  const posClass = q.changePercent >= 0 ? 'pos' : 'neg';
  const changeSign = q.changePercent >= 0 ? '+' : '';
  
  body.innerHTML = `
    <div class="modal-title">${q.symbol}</div>
    <div class="modal-subtitle">${q.longName} · ${q.exchange}</div>
    
    <div class="detail-section" style="text-align:center;background:linear-gradient(135deg,rgba(59,130,246,0.1),rgba(167,139,250,0.1));border:1px solid var(--accent)">
      <div style="font-size:32px;font-weight:800;font-family:'JetBrains Mono',monospace">$${formatPrice(q.price)}</div>
      <div style="font-size:14px;font-family:'JetBrains Mono',monospace;color:${q.changePercent>=0?'var(--green)':'var(--red)'};margin-top:4px;font-weight:700">
        ${changeSign}${q.change.toFixed(2)} (${changeSign}${q.changePercent.toFixed(2)}%)
      </div>
      <div style="font-size:11px;color:var(--dim);margin-top:4px;font-family:'JetBrains Mono',monospace">
        ≈ ${(q.price * fxRate).toLocaleString('ko-KR', {maximumFractionDigits:0})}원
      </div>
    </div>
    
    <div class="detail-section">
      <div class="title">📊 오늘 거래</div>
      <div class="detail-row"><span class="k">시가</span><span class="v">$${formatPrice(q.open)}</span></div>
      <div class="detail-row"><span class="k">고가</span><span class="v">$${formatPrice(q.dayHigh)}</span></div>
      <div class="detail-row"><span class="k">저가</span><span class="v">$${formatPrice(q.dayLow)}</span></div>
      <div class="detail-row"><span class="k">전일 종가</span><span class="v">$${formatPrice(q.previousClose)}</span></div>
      <div class="detail-row"><span class="k">거래량</span><span class="v">${formatVolume(q.volume)}</span></div>
      <div class="detail-row"><span class="k">평균 거래량 (3M)</span><span class="v">${formatVolume(q.avgVolume)}</span></div>
    </div>
    
    <div class="detail-section">
      <div class="title">📅 52주 범위</div>
      <div class="detail-row"><span class="k">52주 고점</span><span class="v pos">$${formatPrice(q.high52)}</span></div>
      <div class="detail-row"><span class="k">52주 저점</span><span class="v neg">$${formatPrice(q.low52)}</span></div>
      <div class="detail-row"><span class="k">현재 위치</span><span class="v">${calcPos52(q).toFixed(1)}%</span></div>
      <div class="detail-row"><span class="k">52주 변화</span><span class="v ${(q.change52Pct||0)>=0?'pos':'neg'}">${q.change52Pct ? (q.change52Pct>=0?'+':'')+q.change52Pct.toFixed(2)+'%' : '-'}</span></div>
    </div>
    
    <div class="detail-section">
      <div class="title">💰 시가총액 · 기본</div>
      <div class="detail-row"><span class="k">시가총액</span><span class="v">${formatMarketCap(q.marketCap)}</span></div>
      <div class="detail-row"><span class="k">발행주식수</span><span class="v">${formatVolume(q.sharesOutstanding)}</span></div>
      <div class="detail-row"><span class="k">P/E (TTM)</span><span class="v">${q.peRatio ? q.peRatio.toFixed(2) : '-'}</span></div>
      <div class="detail-row"><span class="k">EPS (TTM)</span><span class="v">${q.eps ? '$'+q.eps.toFixed(2) : '-'}</span></div>
      <div class="detail-row"><span class="k">베타</span><span class="v">${q.beta ? q.beta.toFixed(2) : '-'}</span></div>
      <div class="detail-row"><span class="k">배당률</span><span class="v">${q.dividendYield ? (q.dividendYield*100).toFixed(2)+'%' : '-'}</span></div>
    </div>
    
    <div class="detail-section">
      <div class="title">💼 내 포지션 (선택)</div>
      <div class="detail-input-group">
        <label>매수가 ($)</label>
        <input type="number" id="buyPriceInput" step="0.01" value="${item?.buyPrice || ''}" placeholder="0.00">
      </div>
      <div class="detail-input-group">
        <label>수량 (주)</label>
        <input type="number" id="sharesInput" step="1" value="${item?.shares || ''}" placeholder="0">
      </div>
      <button class="detail-btn" onclick="savePosition('${symbol}')">💾 포지션 저장</button>
      ${item?.buyPrice ? '<button class="detail-btn danger" onclick="clearPosition(\\''+symbol+'\\')">🗑️ 포지션 삭제</button>' : ''}
    </div>
    
    <div class="detail-section">
      <div class="title">🔗 바로가기</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px">
        <a class="wi-action" href="/bt.html?symbol=${symbol}" style="padding:12px">📊 백테스트</a>
        <a class="wi-action" href="/scanner.html?symbol=${symbol}" style="padding:12px">🎯 스캐너</a>
        <a class="wi-action" href="https://finance.yahoo.com/quote/${symbol}" target="_blank" style="padding:12px">🌐 Yahoo</a>
        <a class="wi-action" href="https://www.tradingview.com/symbols/${symbol}" target="_blank" style="padding:12px">📈 TradingView</a>
      </div>
    </div>
    
    <button class="detail-btn danger" onclick="removeCurrentSymbol()">🗑️ 관심종목에서 제거</button>
  `;
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
  currentSymbol = null;
}

function savePosition(symbol) {
  const buyPrice = parseFloat(document.getElementById('buyPriceInput').value);
  const shares = parseFloat(document.getElementById('sharesInput').value);
  
  const item = watchlist.find(w => w.symbol === symbol);
  if (!item) return;
  
  if (buyPrice > 0 && shares > 0) {
    item.buyPrice = buyPrice;
    item.shares = shares;
    showToast(`✅ ${symbol} 포지션 저장됨`);
  } else {
    item.buyPrice = null;
    item.shares = null;
  }
  
  saveWatchlist();
  closeModal();
  refreshAll();
}

function clearPosition(symbol) {
  const item = watchlist.find(w => w.symbol === symbol);
  if (!item) return;
  item.buyPrice = null;
  item.shares = null;
  saveWatchlist();
  showToast(`✅ 포지션 삭제됨`);
  closeModal();
  refreshAll();
}

function removeCurrentSymbol() {
  if (!currentSymbol) return;
  if (!confirm(`${currentSymbol}을 관심종목에서 제거할까요?`)) return;
  watchlist = watchlist.filter(w => w.symbol !== currentSymbol);
  saveWatchlist();
  closeModal();
  showToast(`🗑️ ${currentSymbol} 제거됨`);
  refreshAll();
}

// ==================== 종목 추가/제거 ====================
async function addSymbol() {
  const input = document.getElementById('symbolInput');
  const symbol = input.value.trim().toUpperCase();
  
  if (!symbol) return;
  
  if (watchlist.some(w => w.symbol === symbol)) {
    showToast('⚠️ 이미 추가된 종목입니다', true);
    return;
  }
  
  // 유효성 체크
  input.disabled = true;
  const q = await fetchQuote(symbol);
  input.disabled = false;
  
  if (q.error) {
    showToast(`❌ ${symbol}: ${q.error}`, true);
    return;
  }
  
  watchlist.push({ symbol, buyPrice: null, shares: null });
  saveWatchlist();
  input.value = '';
  showToast(`✅ ${symbol} 추가됨`);
  refreshAll();
}

function removeSymbol(idx) {
  const sym = watchlist[idx].symbol;
  if (!confirm(`${sym} 제거?`)) return;
  watchlist.splice(idx, 1);
  saveWatchlist();
  refreshAll();
}

// ==================== 유틸 ====================
function formatPrice(p) {
  if (p === null || p === undefined) return '-';
  return p.toFixed(p < 1 ? 4 : 2);
}

function formatMarketCap(mc) {
  if (!mc) return '-';
  if (mc >= 1e12) return `$${(mc/1e12).toFixed(2)}T`;
  if (mc >= 1e9) return `$${(mc/1e9).toFixed(2)}B`;
  if (mc >= 1e6) return `$${(mc/1e6).toFixed(1)}M`;
  return `$${mc.toLocaleString()}`;
}

function formatVolume(v) {
  if (!v) return '-';
  if (v >= 1e9) return `${(v/1e9).toFixed(2)}B`;
  if (v >= 1e6) return `${(v/1e6).toFixed(1)}M`;
  if (v >= 1e3) return `${(v/1e3).toFixed(0)}K`;
  return v.toString();
}

function truncate(str, len) {
  if (!str) return '';
  return str.length > len ? str.substring(0, len) + '…' : str;
}

function calcPos52(q) {
  const range = q.high52 - q.low52;
  return range > 0 ? ((q.price - q.low52) / range) * 100 : 50;
}

function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast active' + (isError ? ' error' : '');
  setTimeout(() => toast.classList.remove('active'), 2500);
}

// ==================== 초기화 ====================
document.getElementById('symbolInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') addSymbol();
});

// 최초 로딩
refreshAll();

// 5분마다 자동 갱신
refreshInterval = setInterval(refreshAll, 5 * 60 * 1000);

// 탭 포커스 시 즉시 갱신
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) refreshAll();
});
</script>

</body>
</html>
